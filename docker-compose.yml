version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# VIGILANT.IN — Full Stack Docker Compose
# Run: docker-compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL — Primary relational store ──────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: darpan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vigilant
      POSTGRES_USER: ${POSTGRES_USER:-vigilant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/postgres_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigilant"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j — Entity relationship graph ─────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: darpan_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme_in_production}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme_in_production}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Redis — Job queue and caching ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: darpan_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_in_production}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: darpan_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vigilant}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/vigilant
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ./engine:/app/engine
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Airflow — Scheduler + Webserver ───────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.9.0
    container_name: darpan_airflow_web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-vigilant}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER:-vigilant}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.0
    container_name: darpan_airflow_scheduler
    restart: unless-stopped
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-vigilant}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./scrapers:/opt/airflow/scrapers
      - ./engine:/opt/airflow/engine
      - airflow_logs:/opt/airflow/logs
    command: scheduler

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  airflow_logs:
